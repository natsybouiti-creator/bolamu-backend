version: '3.8'
services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
  
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bolamu_test
      POSTGRES_USER: bolamu
      POSTGRES_PASSWORD: bolamu_test_pwd
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
