<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolamu — Profil Adhérent</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#003FB1">
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
  <script src="/js/bolamu-avatar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F4F8FF; color: #0A2463; min-height: 100vh; padding: 24px 20px; display: flex; align-items: center; justify-content: center; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0; vertical-align: middle; }
    .container { max-width: 420px; width: 100%; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; color: #5A6E8C; font-weight: 700; font-size: 0.9rem; }
    .card { background: #fff; border-radius: 24px; padding: 32px 28px; box-shadow: 0 12px 40px rgba(10,36,99,0.1); text-align: center; }
    .bolamu-avatar { display: inline-flex; align-items: center; justify-content: center; border-radius: 9999px; overflow: hidden; position: relative; flex-shrink: 0; color: #fff; margin-bottom: 18px; }
    .bolamu-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bolamu-avatar__fallback { width: 100%; height: 100%; align-items: center; justify-content: center; font-weight: 800; }
    .name { font-size: 1.3rem; font-weight: 800; color: #0A2463; margin-bottom: 6px; }
    .bolamu-id { font-size: 0.85rem; font-weight: 600; color: #5A6E8C; letter-spacing: 0.02em; margin-bottom: 18px; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 9999px; font-size: 0.85rem; font-weight: 800; }
    .status-actif { background: rgba(0,201,167,0.12); color: #00875f; }
    .status-suspendu { background: rgba(186,26,26,0.1); color: #BA1A1A; }
    .status-expire { background: rgba(245,166,35,0.12); color: #B0680A; }
    .status-en_attente, .status-inactif { background: #EDEDF8; color: #5A6E8C; }
    .loading, .error-box { text-align: center; padding: 40px 10px; }
    .error-box .material-symbols-outlined { font-size: 48px; color: #BA1A1A; margin-bottom: 12px; }
    .error-title { font-size: 1.1rem; font-weight: 800; color: #BA1A1A; margin-bottom: 8px; }
    .error-text { font-size: 0.9rem; color: #5A6E8C; line-height: 1.5; }
    .loading .material-symbols-outlined { font-size: 32px; color: #003FB1; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand"><span class="material-symbols-outlined" style="font-size:20px;">badge</span> Carte Bolamu</div>
    <div class="card" id="content">
      <div class="loading"><span class="material-symbols-outlined">progress_activity</span></div>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const content = document.getElementById('content');

    function showError(title, text) {
      content.innerHTML = `
        <div class="error-box">
          <span class="material-symbols-outlined">error</span>
          <div class="error-title">${title}</div>
          <div class="error-text">${text}</div>
        </div>`;
    }

    const STATUT_LABELS = {
      actif: { label: 'Adhérent actif', cls: 'status-actif', icon: 'check_circle' },
      suspendu: { label: 'Compte suspendu', cls: 'status-suspendu', icon: 'block' },
      expire: { label: 'Abonnement expiré', cls: 'status-expire', icon: 'schedule' },
      en_attente: { label: 'Abonnement en attente', cls: 'status-en_attente', icon: 'hourglass_empty' },
      inactif: { label: 'Aucun abonnement actif', cls: 'status-inactif', icon: 'info' }
    };

    if (!token) {
      showError('QR code invalide', 'Veuillez scanner un QR code Bolamu valide.');
    } else {
      fetch(`https://www.bolamu.co/api/v1/qr/profil?token=${encodeURIComponent(token)}`)
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            if (data.message && data.message.includes('expiré')) {
              showError('QR code expiré', 'Demandez à l\'adhérent de générer un nouveau code.');
            } else {
              showError('QR code invalide', data.message || 'Veuillez scanner un QR code Bolamu valide.');
            }
            return;
          }
          const p = data.data;
          const statut = STATUT_LABELS[p.statut] || STATUT_LABELS.inactif;
          const avatarHtml = (window.BolamuAvatar && typeof window.BolamuAvatar.render === 'function')
            ? window.BolamuAvatar.render({ photoUrl: p.photo_url, fullName: p.full_name, role: 'patient', size: 96 })
            : '';
          content.innerHTML = `
            ${avatarHtml}
            <div class="name">${escapeHtml(p.full_name || 'Adhérent Bolamu')}</div>
            <div class="bolamu-id">${p.bolamu_id ? 'ID Bolamu : ' + escapeHtml(p.bolamu_id) : ''}</div>
            <span class="status-badge ${statut.cls}"><span class="material-symbols-outlined" style="font-size:18px;">${statut.icon}</span>${statut.label}</span>
          `;
        })
        .catch(() => {
          showError('Erreur de chargement', 'Impossible de charger le profil. Veuillez réessayer.');
        });
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
  </script>
</body>
</html>
