<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="flex: 0 0 230px; scroll-snap-align: start; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 16px;">
  <div style="height: 100px; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; margin-bottom: 12px;"><span class="material-symbols-outlined" style="color: rgba(255,255,255,0.45); font-size: 40px;">{{ icon }}</span></div>
  <span style="background: rgba(255,107,53,0.2); color: #FF6B35; font-size: 0.58rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 9999px;">{{ cat }}</span>
  <div style="font-size: 0.92rem; font-weight: 700; color: #fff; margin: 8px 0;">{{ title }}</div>
  <div style="display: flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 700; margin-bottom: 10px; color: {{ timerColor }};"><span class="material-symbols-outlined" style="font-size: 14px;">schedule</span>{{ timer }}</div>
  <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;"><span style="font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.4); text-decoration: line-through;">{{ old }}</span><span style="font-size: 0.95rem; font-weight: 800; color: #F5A623;">{{ now }}</span></div>
  <button style="width: 100%; background: #FF6B35; color: #fff; border: none; padding: 9px; border-radius: 12px; font-weight: 700; font-size: 0.82rem; cursor: pointer;">Débloquer</button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:230,&quot;height&quot;:250},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;smartphone&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cat&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Télécom&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Crédit MTN 5 000F&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;old&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;700&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;now&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;500 pts&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;timer&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;23h 47min restantes&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;urgent&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { timerColor: this.props.urgent ? '#FF6B35' : 'rgba(255,255,255,0.55)' };
  }
}
</script>
</body>
</html>
