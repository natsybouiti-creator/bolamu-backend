<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<button style="{{ rowStyle }}">
  <span class="material-symbols-outlined" style="color: {{ tint }}; font-size: 22px;">{{ icon }}</span>
  <span style="flex: 1; text-align: left; font-size: 0.92rem; font-weight: 700; color: {{ tint }};">{{ label }}</span>
  <span class="material-symbols-outlined" style="color: #C3C5D7; font-size: 20px;">chevron_right</span>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:56},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;person&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Mes informations&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;danger&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      tint: this.props.danger ? '#BA1A1A' : '#0A2463',
      rowStyle: {
        width: '100%', display: 'flex', alignItems: 'center', gap: '14px',
        background: '#fff', border: '1px solid #EDEDF8', borderRadius: '14px',
        padding: '15px 18px', cursor: 'pointer', fontFamily: 'inherit'
      }
    };
  }
}
</script>
</body>
</html>
