<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background: #fff; border: 1px solid #EDEDF8; border-radius: 18px; overflow: hidden; height: 100%; transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;" style-hover="box-shadow: 0 12px 32px rgba(0,63,177,0.08); transform: translateY(-3px); border-color: #003FB1;">
  <div style="position: relative; height: 140px; background: #F3F3FE; display: flex; align-items: center; justify-content: center;">
    <span class="material-symbols-outlined" style="color: #C3C5D7; font-size: 48px;">{{ icon }}</span>
    <span style="position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.92); color: #434654; font-size: 0.6rem; font-weight: 700; padding: 4px 10px; border-radius: 9999px;">{{ cat }}</span>
    <sc-if value="{{ stock }}" hint-placeholder-val="{{ true }}">
      <span style="position: absolute; top: 10px; right: 10px; background: #BA1A1A; color: #fff; font-size: 0.56rem; font-weight: 800; letter-spacing: 0.04em; padding: 4px 9px; border-radius: 9999px;">STOCK LIMITÉ</span>
    </sc-if>
  </div>
  <div style="padding: 16px;">
    <div style="font-size: 1rem; font-weight: 700; color: #0A2463;">{{ partnerName }}</div>
    <p style="margin: 4px 0 14px; font-size: 0.8rem; font-weight: 500; color: #434654;">{{ desc }}</p>
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <span style="background: rgba(255,107,53,0.1); color: #FF6B35; font-size: 0.82rem; font-weight: 800; padding: 5px 12px; border-radius: 9999px;">{{ pts }}</span>
      <button style="background: #003FB1; color: #fff; border: none; padding: 8px 18px; border-radius: 9999px; font-weight: 700; font-size: 0.8rem; cursor: pointer;">Échanger</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:260},&quot;partnerName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Crédit MTN&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cat&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Télécom&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;desc&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Recharge mobile 5 000 FCFA&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;pts&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;500 pts&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;smartphone&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;stock&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}"></script>
</body>
</html>
