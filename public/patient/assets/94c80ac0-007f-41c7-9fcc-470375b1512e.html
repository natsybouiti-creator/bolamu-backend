<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ rowStyle }}">
  <div style="width: 36px; height: 36px; border-radius: 9999px; background: #F3F3FE; display: flex; align-items: center; justify-content: center; flex-shrink: 0;"><span class="material-symbols-outlined" style="color: #434654; font-size: 19px;">{{ icon }}</span></div>
  <div style="flex: 1; min-width: 0;">
    <div style="font-size: 0.86rem; font-weight: 600; color: #191B23;">{{ label }}</div>
    <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;"><span style="font-size: 0.72rem; font-weight: 500; color: #9498a8;">{{ date }}</span><span style="display: inline-flex; align-items: center; gap: 3px; font-size: 0.62rem; font-weight: 700; color: #00875f;"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 12px;">verified</span>preuve vérifiée</span></div>
  </div>
  <span style="font-size: 0.88rem; font-weight: 800; color: {{ deltaColor }};">{{ delta }} pts</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:56},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;medical_services&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Consultation Dr Ntolo&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;14 juin 2026&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;delta&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+50&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;pos&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;last&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      deltaColor: this.props.pos ? '#00875f' : '#BA1A1A',
      rowStyle: {
        display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 16px',
        borderBottom: this.props.last ? 'none' : '1px solid #EDEDF8'
      }
    };
  }
}
</script>
</body>
</html>
