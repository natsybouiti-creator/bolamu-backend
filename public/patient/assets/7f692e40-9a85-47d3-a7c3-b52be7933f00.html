<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="flex: 0 0 170px; scroll-snap-align: start; background: #fff; border: 1px solid #EDEDF8; border-radius: 16px; padding: 16px;">
  <div style="width: 48px; height: 48px; border-radius: 9999px; background: rgba(0,201,167,0.1); display: flex; align-items: center; justify-content: center;"><span class="material-symbols-outlined" style="color: #00C9A7; font-size: 26px;">{{ icon }}</span></div>
  <div style="font-size: 0.92rem; font-weight: 700; color: #0A2463; margin: 10px 0 4px;">{{ gname }}</div>
  <div style="display: flex; align-items: center; gap: 4px; font-size: 0.72rem; font-weight: 600; color: #00875f;"><span class="material-symbols-outlined" style="font-size: 13px;">group</span>{{ members }}</div>
  <div style="font-size: 0.72rem; font-weight: 700; color: #B0680A; margin: 4px 0 12px;">{{ score }} collectifs</div>
  <button style="width: 100%; background: transparent; border: 1px solid #00C9A7; color: #00875f; font-weight: 700; font-size: 0.78rem; padding: 7px; border-radius: 9999px; cursor: pointer;">Rejoindre</button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:170,&quot;height&quot;:180},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;directions_run&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;gname&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Course à pied&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;members&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;48 membres&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;score&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;82 400 pts&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
