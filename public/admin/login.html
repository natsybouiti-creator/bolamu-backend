<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolamu — Accès Administration</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#2E86FF">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#00174d",
                        "inverse-primary": "#b5c4ff",
                        "surface-container-low": "#f3f3fe",
                        "primary-container": "#1a56db",
                        "on-secondary-fixed-variant": "#2e4382",
                        "on-primary-container": "#d4dcff",
                        "tertiary-container": "#006e5a",
                        "secondary-container": "#a2b6fd",
                        "on-tertiary-fixed-variant": "#005142",
                        "on-tertiary-container": "#58f5d1",
                        "surface-bright": "#faf8ff",
                        "on-tertiary-fixed": "#002019",
                        "surface-dim": "#d9d9e4",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#dce1ff",
                        "inverse-on-surface": "#f0f0fb",
                        "tertiary-fixed-dim": "#38debb",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#faf8ff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#00164d",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#314685",
                        "surface-container-high": "#e7e7f3",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#191b23",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#ededf8",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#003dab",
                        "tertiary": "#005344",
                        "outline": "#737686",
                        "surface-variant": "#e2e1ed",
                        "background": "#faf8ff",
                        "on-background": "#191b23",
                        "surface-tint": "#1353d8",
                        "surface-container-highest": "#e2e1ed",
                        "primary-fixed-dim": "#b5c4ff",
                        "outline-variant": "#c3c5d7",
                        "tertiary-fixed": "#5ffbd6",
                        "on-surface-variant": "#434654",
                        "primary": "#003fb1",
                        "inverse-surface": "#2e3039",
                        "secondary-fixed-dim": "#b5c4ff",
                        "secondary": "#475b9c",
                        "brand-navy": "#0A2463",
                        "brand-turquoise": "#00C9A7",
                        "brand-orange": "#FF6B35"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "container-margin": "20px",
                        "md": "24px",
                        "gutter": "16px",
                        "base": "8px",
                        "xl": "64px",
                        "lg": "40px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
    .msg-box { display: none; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 13px; margin-bottom: 16px; }
    .msg-box.show.error { background: #ffdad6; color: #93000a; border: 1px solid #ba1a1a; display: block; }
    .msg-box.show.success { background: #d4f5ee; color: #005344; border: 1px solid #00C9A7; display: block; }
    .btn-login { width: 100%; padding: 16px; border-radius: 9999px; font-weight: 800; font-size: 15px; cursor: pointer; border: none; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; background: #DC2626; color: white; box-shadow: 0 8px 24px rgba(220,38,38,0.3); }
    .btn-login:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .role-indicator { display: none; margin-bottom: 16px; padding: 10px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .role-indicator.show { display: block; }
    .role-indicator.ops { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.2); color: #DC2626; }
    .role-indicator.content { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); color: #7C3AED; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12 bg-[#7f1d1d]">

<div class="w-full max-w-sm">

  <!-- LOGO + IDENTITÉ -->
  <div class="text-center mb-8">
    <img src="/images/landing/bolamu-logo-final.png" class="h-14 w-14 rounded-full mx-auto mb-4" alt="Bolamu">
    <h1 class="text-xl font-extrabold text-white mb-2">Bolamu</h1>
    <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-white/15 border border-white/20">
      <span class="text-white/90 text-xs font-black uppercase tracking-widest">ADMINISTRATION</span>
    </div>
  </div>

  <!-- CARD -->
  <div class="bg-white rounded-[2rem] p-8 shadow-2xl">
    <h2 class="text-xl font-extrabold text-brand-navy mb-1">Connexion sécurisée</h2>
    <p class="text-sm text-on-surface-variant font-medium mb-6">Accès réservé aux administrateurs Bolamu.</p>

    <!-- msg-box -->
    <div class="msg-box" id="msg"></div>

    <!-- role-indicator -->
    <div class="role-indicator" id="role-indicator"></div>

    <!-- Champ téléphone -->
    <div class="mb-4">
      <label class="block text-xs font-black text-brand-navy uppercase tracking-wider mb-2">Numéro de téléphone</label>
      <input type="tel" id="phone" placeholder="+242 06 XXX XX XX" maxlength="15"
        class="w-full px-4 py-3.5 rounded-2xl border-2 border-outline-variant
               focus:border-red-600 focus:ring-4 focus:ring-red-600/10
               outline-none font-medium text-on-surface bg-white
               placeholder:text-on-surface-variant/40 transition-all">
    </div>

    <!-- Champ mot de passe -->
    <div class="mb-6">
      <label class="block text-xs font-black text-brand-navy uppercase tracking-wider mb-2">Mot de passe</label>
      <div class="relative">
        <input type="password" id="password" placeholder="••••••••••"
          class="w-full px-4 py-3.5 pr-12 rounded-2xl border-2 border-outline-variant
                 focus:border-red-600 focus:ring-4 focus:ring-red-600/10
                 outline-none font-medium text-on-surface bg-white
                 placeholder:text-on-surface-variant/40 transition-all">
        <button id="toggle-btn" type="button"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-red-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <!-- Bouton -->
    <button class="btn-login w-full py-4 rounded-full font-black text-base cursor-pointer border-none transition-all" id="btn-login">
      Accéder au panneau de contrôle →
    </button>

    <!-- Note sécurité -->
    <p class="text-center text-xs text-on-surface-variant/50 font-medium mt-5 leading-relaxed">
      Les tentatives de connexion échouées sont enregistrées avec l'adresse IP.
    </p>

    <!-- attempts-info -->
    <div class="text-center text-xs text-on-surface-variant/50 font-medium mt-4" id="attempts-info" style="display:none">
      Tentatives échouées : <span id="attempts-count" class="text-red-600 font-bold">0</span>/5
    </div>

  </div>

  <!-- Lien retour -->
  <p class="text-center mt-6">
    <a href="/" class="text-xs font-bold text-white/50 hover:text-white transition-colors">← Retour à l'accueil</a>
  </p>

</div>

<script>
  /* ── Vérification session existante ── */
  (async function checkExistingSession() {
    const t = localStorage.getItem('bolamu_admin_token');
    const r = localStorage.getItem('bolamu_role');
    if (!t) return;
    if (r !== 'admin' && r !== 'content_admin') return;
    try {
      const res = await fetch('/api/v1/auth/me', { headers: { 'Authorization': 'Bearer ' + t } });
      if (res.ok) {
        const data = await res.json();
        if (data.role === 'admin') { window.location.href = '/admin/dashboard.html'; return; }
        if (data.role === 'content_admin') { window.location.href = '/admin/content.html'; return; }
      }
      localStorage.clear();
    } catch(e) {
      localStorage.clear();
    }
  })();

  let attempts = 0;

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg-box show ${type}`;
    setTimeout(() => el.className = 'msg-box', 5000);
  }

  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('toggle-btn');
    if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'; }
    else { inp.type = 'password'; btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'; }
  }

  /* ── Redirection selon le rôle reçu du backend ── */
  function redirectByRole(role) {
    if (role === 'admin') {
      window.location.href = '/admin/dashboard.html';
    } else if (role === 'content_admin') {
      window.location.href = '/admin/content.html';
    } else {
      showMsg('Accès non autorisé pour ce compte.', 'error');
    }
  }

  async function doLogin() {
const phone = document.getElementById('phone').value.trim().replace(/\s+/g, '');
    const password = document.getElementById('password').value.trim();
    if (!phone || !password) { showMsg('Veuillez remplir tous les champs.', 'error'); return; }
    if (attempts >= 5) { showMsg('Trop de tentatives. Réessayez dans quelques minutes.', 'error'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Vérification en cours...';

    try {
      const res = await fetch('/api/v1/auth/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        /* Stockage du token et du rôle */
        localStorage.setItem('bolamu_admin_token', data.accessToken);
        localStorage.setItem('bolamu_admin_phone', data.phone);
        localStorage.setItem('bolamu_role',  data.role);

        /* Affichage de l'indicateur de rôle */
        const ri = document.getElementById('role-indicator');
        if (data.role === 'admin') {
          ri.className = 'role-indicator show ops';
          ri.innerHTML = '<span class="material-symbols-outlined text-sm">admin_panel_settings</span> Espace Opérationnel — Redirection...';
        } else {
          ri.className = 'role-indicator show content';
          ri.innerHTML = '<span class="material-symbols-outlined text-sm">edit</span> Espace Éditorial — Redirection...';
        }

        showMsg('✅ Connexion réussie !', 'success');
        setTimeout(() => redirectByRole(data.role), 1200);
      } else {
        attempts++;
        document.getElementById('attempts-info').style.display = 'block';
        document.getElementById('attempts-count').textContent = attempts;
        showMsg(data.message || 'Identifiants incorrects.', 'error');
        btn.disabled = false;
        btn.textContent = 'Accéder au panneau de contrôle →';
      }
    } catch(e) {
      showMsg('Erreur de connexion. Vérifiez internet.', 'error');
      btn.disabled = false;
      btn.textContent = 'Accéder au panneau de contrôle →';
    }
  }
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Toggle password visibility
  document.getElementById('toggle-btn').addEventListener('click', togglePw);
  
  // Login button
  document.getElementById('btn-login').addEventListener('click', doLogin);
  
  // Enter key on password field
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});
</script>

</body>
</html>
