<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolamu — Connexion</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#2E86FF">
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#00174d",
                        "inverse-primary": "#b5c4ff",
                        "surface-container-low": "#f3f3fe",
                        "primary-container": "#1a56db",
                        "on-secondary-fixed-variant": "#2e4382",
                        "on-primary-container": "#d4dcff",
                        "tertiary-container": "#006e5a",
                        "secondary-container": "#a2b6fd",
                        "on-tertiary-fixed-variant": "#005142",
                        "on-tertiary-container": "#58f5d1",
                        "surface-bright": "#faf8ff",
                        "on-tertiary-fixed": "#002019",
                        "surface-dim": "#d9d9e4",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#dce1ff",
                        "inverse-on-surface": "#f0f0fb",
                        "tertiary-fixed-dim": "#38debb",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#faf8ff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#00164d",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#314685",
                        "surface-container-high": "#e7e7f3",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#191b23",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#ededf8",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#003dab",
                        "tertiary": "#005344",
                        "outline": "#737686",
                        "surface-variant": "#e2e1ed",
                        "background": "#faf8ff",
                        "on-background": "#191b23",
                        "surface-tint": "#1353d8",
                        "surface-container-highest": "#e2e1ed",
                        "primary-fixed-dim": "#b5c4ff",
                        "outline-variant": "#c3c5d7",
                        "tertiary-fixed": "#5ffbd6",
                        "on-surface-variant": "#434654",
                        "primary": "#003fb1",
                        "inverse-surface": "#2e3039",
                        "secondary-fixed-dim": "#b5c4ff",
                        "secondary": "#475b9c",
                        "brand-navy": "#0A2463",
                        "brand-turquoise": "#00C9A7",
                        "brand-orange": "#FF6B35"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "container-margin": "20px",
                        "md": "24px",
                        "gutter": "16px",
                        "base": "8px",
                        "xl": "64px",
                        "lg": "40px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf8ff; margin: 0; }
    .step { display: none; }
    .step.active { display: block; }
    .msg-box { display: none; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 14px; margin-bottom: 20px; }
    .msg-box.success { background: #d4f5ee; color: #005344; border: 1px solid #00C9A7; display: block; }
    .msg-box.error { background: #ffdad6; color: #93000a; border: 1px solid #ba1a1a; display: block; }
    .btn-primary { width: 100%; padding: 15px; background: #003fb1; color: white; border-radius: 9999px; font-weight: 800; font-size: 15px; cursor: pointer; border: none; transition: all 0.2s; box-shadow: 0 8px 24px rgba(0,63,177,0.25); font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-primary:hover { background: #0A2463; transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body class="min-h-screen bg-[#faf8ff] flex flex-col">

  <!-- TOPBAR -->
  <nav class="py-4 px-6 border-b border-outline-variant/30 bg-white/80 backdrop-blur-md">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <a href="/" class="flex items-center gap-2">
        <img src="/images/landing/bolamu-logo-final.png" class="h-10 w-10 rounded-full" alt="Bolamu">
        <span class="font-extrabold text-brand-navy text-lg">Bolamu</span>
      </a>
      <a href="/register.html" class="text-sm font-bold text-primary hover:text-brand-navy transition-colors">
        Créer un compte →
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <!-- CARD -->
      <div class="bg-white rounded-[2rem] p-8 shadow-xl shadow-black/[0.06] border border-outline-variant/30">

        <!-- Titre -->
        <div class="mb-8">
          <h1 class="text-2xl font-extrabold text-brand-navy mb-1">Connexion</h1>
          <p class="text-sm text-on-surface-variant font-medium">Accédez à votre espace Bolamu</p>
        </div>

        <!-- msg-box -->
        <div id="msg" class="msg-box"></div>

        <!-- ÉTAPE LOGIN -->
        <div class="step active" id="step-login">
          <div class="mb-5">
            <label class="block text-sm font-bold text-brand-navy mb-2">Numéro de téléphone</label>
            <input type="tel" id="phone-input" placeholder="+242 06 XXX XX XX" maxlength="15"
              class="w-full px-4 py-3.5 rounded-2xl border-2 border-outline-variant
                     focus:border-primary focus:ring-4 focus:ring-primary/10
                     outline-none font-medium text-on-surface bg-white
                     placeholder:text-on-surface-variant/40 transition-all">
          </div>
          <div class="mb-3">
            <label class="block text-sm font-bold text-brand-navy mb-2">Mot de passe</label>
            <div class="relative">
              <input type="password" id="password-input" placeholder="••••••••••" maxlength="20"
                class="w-full px-4 py-3.5 pr-12 rounded-2xl border-2 border-outline-variant
                       focus:border-primary focus:ring-4 focus:ring-primary/10
                       outline-none font-medium text-on-surface bg-white
                       placeholder:text-on-surface-variant/40 transition-all">
              <span id="eye-icon" class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-on-surface-variant hover:text-primary transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </div>
          </div>
          <div class="flex justify-end mb-7">
            <button id="forgot-link" class="text-xs font-bold text-primary hover:text-brand-navy transition-colors">
              Mot de passe oublié ?
            </button>
          </div>
          <button class="btn-primary" id="btn-login">Se connecter →</button>
          <p class="text-center text-sm text-on-surface-variant mt-6 font-medium">
            Pas encore membre ?
            <a href="/register.html" class="text-primary font-bold hover:text-brand-navy transition-colors">Créer un compte →</a>
          </p>
        </div>

        <!-- ÉTAPE FORGOT -->
        <div class="step" id="step-forgot">
          <div class="w-12 h-12 bg-brand-turquoise/10 rounded-2xl flex items-center justify-center mb-5">
            <span class="material-symbols-outlined text-brand-turquoise text-2xl">sms</span>
          </div>
          <h2 class="text-xl font-extrabold text-brand-navy mb-2">Mot de passe oublié</h2>
          <p class="text-sm text-on-surface-variant font-medium mb-7">
            Entrez votre numéro — nous vous envoyons un nouveau mot de passe par SMS.
          </p>
          <div class="mb-7">
            <label class="block text-sm font-bold text-brand-navy mb-2">Numéro de téléphone</label>
            <input type="tel" id="forgot-phone-input" placeholder="+242 06 XXX XX XX" maxlength="15"
              class="w-full px-4 py-3.5 rounded-2xl border-2 border-outline-variant
                     focus:border-primary focus:ring-4 focus:ring-primary/10
                     outline-none font-medium text-on-surface bg-white
                     placeholder:text-on-surface-variant/40 transition-all">
          </div>
          <button class="btn-primary" id="btn-forgot">Recevoir mon mot de passe →</button>
          <p class="text-center mt-5">
            <button id="back-login-link" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">
              ← Retour à la connexion
            </button>
          </p>
        </div>

      </div>

    </div>
  </main>

  <!-- FOOTER MINI -->
  <div class="py-5 px-6 border-t border-outline-variant/20 flex flex-wrap justify-center gap-x-6 gap-y-2">
    <a href="/cgu.html" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors">CGU</a>
    <a href="/confidentialite.html" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors">Confidentialité</a>
    <a href="mailto:bolamucontact@gmail.com" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors">Contact</a>
    <span class="w-full text-center mt-1 flex justify-center gap-6">
      <a href="/secretaire/login.html" class="text-[10px] font-bold text-on-surface-variant/40 hover:text-primary transition-colors uppercase tracking-wider">Secrétariat</a>
      <a href="/rh/login.html" class="text-[10px] font-bold text-on-surface-variant/40 hover:text-primary transition-colors uppercase tracking-wider">Espace RH</a>
    </span>
  </div>

<script>
function showMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg-box '+type;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},4000);
}

function togglePassword() {
  const input = document.getElementById('password-input');
  const eye = document.getElementById('eye-icon');
  if (input.type === 'password') { 
    input.type = 'text'; 
    eye.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5A6E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  }
  else { 
    input.type = 'password'; 
    eye.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5A6E8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
}

function showForgot() {
  document.getElementById('step-login').classList.remove('active');
  document.getElementById('step-forgot').classList.add('active');
}

function showLogin() {
  document.getElementById('step-forgot').classList.remove('active');
  document.getElementById('step-login').classList.add('active');
}

async function doLogin() {
  const phone = document.getElementById('phone-input').value.trim();
  const password = document.getElementById('password-input').value.trim();
  if (!phone || phone.length < 8) { showMsg('Veuillez entrer un numéro valide.', 'error'); return; }
  if (!password) { showMsg('Veuillez entrer votre mot de passe.', 'error'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const res = await fetch('https://api.bolamu.co/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, password })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      const role = data.role;
      if (role === 'patient') {
        localStorage.setItem('bolamu_patient_token', data.accessToken);
        localStorage.setItem('bolamu_patient_phone', data.phone);
      } else {
        localStorage.setItem(`bolamu_${role}_token`, data.accessToken);
        localStorage.setItem(`bolamu_${role}_phone`, data.phone);
      }
      localStorage.setItem('bolamu_role', role);
      showMsg('Connexion réussie ! Redirection…', 'success');
      setTimeout(() => { window.location.href = data.redirectUrl; }, 1500);
    } else {
      showMsg(data.message || 'Identifiants incorrects.', 'error');
    }
  } catch(e) { showMsg('Erreur de connexion. Vérifiez internet.', 'error'); }
  btn.disabled = false; btn.textContent = 'Se connecter →';
}

async function doForgotPassword() {
  const phone = document.getElementById('forgot-phone-input').value.trim();
  if (!phone || phone.length < 8) { showMsg('Veuillez entrer un numéro valide.', 'error'); return; }
  const btn = document.getElementById('btn-forgot');
  btn.disabled = true; btn.textContent = 'Envoi…';
  try {
    const res = await fetch('https://api.bolamu.co/api/v1/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      showMsg('Nouveau mot de passe envoyé par SMS !', 'success');
      setTimeout(() => showLogin(), 3000);
    } else {
      showMsg(data.message || 'Erreur.', 'error');
    }
  } catch(e) { showMsg('Erreur de connexion.', 'error'); }
  btn.disabled = false; btn.textContent = 'Recevoir mon mot de passe →';
}

async function checkMagicLink() {
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  if (!token) return;

  // Nettoie l'URL immédiatement
  history.replaceState({}, document.title, window.location.pathname);

  showMsg('Connexion en cours...', 'success');
  const btn = document.getElementById('btn-login');
  btn.disabled = true;

  try {
    const res = await fetch(`https://api.bolamu.co/api/v1/auth/onboarding/${token}`);
    const data = await res.json();

    if (data.success) {
      const role = data.user.role;
      localStorage.setItem(`bolamu_${role}_token`, data.token);
      localStorage.setItem(`bolamu_${role}_phone`, data.user.phone);
      localStorage.setItem('bolamu_role', role);

      const dashboards = {
        patient: '/patient/dashboard.html',
        doctor: '/medecin/dashboard.html',
        pharmacie: '/pharmacie/dashboard.html',
        laboratoire: '/laboratoire/dashboard.html',
        secretaire: '/secretaire/dashboard.html',
        company_rh: '/rh/dashboard.html'
      };
      showMsg('Connexion réussie ! Redirection…', 'success');
      setTimeout(() => { window.location.href = dashboards[role] || '/'; }, 1000);
    } else {
      btn.disabled = false;
      showMsg(data.message || 'Lien invalide. Veuillez vous connecter normalement.', 'error');
    }
  } catch (err) {
    btn.disabled = false;
    showMsg('Erreur de connexion. Veuillez réessayer.', 'error');
    console.error('[MagicLink]', err);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('eye-icon').addEventListener('click', togglePassword);
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('forgot-link').addEventListener('click', showForgot);
  document.getElementById('btn-forgot').addEventListener('click', doForgotPassword);
  document.getElementById('back-login-link').addEventListener('click', showLogin);
  checkMagicLink();
});
</script>

</body>
</html>
