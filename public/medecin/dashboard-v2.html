<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#002b80",
                        "secondary": "#006b58",
                        "background": "#faf8ff",
                        "surface": "#ffffff",
                        "navy": "#1E2A4A",
                        "teal": "#0E7C61",
                        "border-light": "#EEF0F3",
                        "on-surface": "#1a1b22",
                        "outline": "#747685",
                        "error": "#ba1a1a"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"]
                    },
                    boxShadow: {
                        "subtle": "0 4px 20px rgba(30, 42, 74, 0.05)",
                        "hover": "0 8px 30px rgba(30, 42, 74, 0.08)"
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf8ff; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        
        .sidebar { background-color: #0A2463; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-custom { 
            background-color: #ffffff; 
            border-radius: 2rem; 
            box-shadow: 0 4px 20px rgba(30, 42, 74, 0.05); 
            border: 1px solid #EEF0F3;
            transition: all 0.3s ease;
        }
        .card-custom:hover { box-shadow: 0 8px 30px rgba(30, 42, 74, 0.08); }
        
        .active-nav { background-color: rgba(255, 255, 255, 0.1); border-radius: 0.75rem; color: #ffffff !important; }
        
        .btn-primary { 
            background-color: #002b80; 
            color: white; 
            border-radius: 1rem; 
            padding: 0.75rem 1.5rem; 
            font-weight: 600; 
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover { background-color: #001f5c; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .pulse-recording { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(186, 26, 26, 0); } 100% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); } }
        
        .dictation-wave { display: flex; align-items: center; gap: 3px; height: 14px; }
        .dictation-wave span { width: 2px; height: 100%; background: #ba1a1a; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.2); } }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .zora-rail { background: linear-gradient(135deg, #FFD200 0%, #F7941D 100%); color: #004F9F; }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            main { margin-left: 0 !important; }
            header { left: 0 !important; width: 100% !important; }
        }
    </style>
</head>

<div class="w-10 h-10 rounded-xl bg-secondary flex items-center justify-center text-white font-bold shadow-lg">MJ</div>

</div>
</div>
<div class="flex items-center gap-3 lg:gap-6">

<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2.5 right-2.5 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
</button>

<div class="flex items-center gap-3 cursor-pointer group" onclick="navigate('Mon profil')">
<div class="text-right hidden md:block">
<p class="text-sm font-bold text-navy">Dr. Moukala</p>

</div>
<div class="w-10 h-10 lg:w-12 lg:h-12 rounded-xl overflow-hidden ring-2 ring-border-light group-hover:ring-primary/20 transition-all">
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDcTEgu7F26ep-SQh8fxnxNfbO_kBWaTiZVaj9AOf3Q1BfiZNwDZUcKbLv1k1aV1KDIRESHMam5XqQRZSsrQuDZUVvk7ohQDZGooqQ818iz1aTQZCGKrnfFxYx8iAaG6L38AEIeYbNKSN5gnQxMHim0dxIwMjVQprRLFGKi_MgC3VbuTskxkiYxo21rWLTnPxfJiQaT6PrsTkCr9-xiz7V38Osw7iQkdYpkzjAWPWusixO99vHnDTqWMA"/>

<!-- MODALS -->

<div class="bg-white w-full max-w-5xl h-full lg:max-h-[85vh] overflow-hidden rounded-2xl flex flex-col shadow-2xl animate-in fade-in zoom-in duration-300">

<div class="flex items-center justify-center overflow-x-auto hide-scroll px-8 py-5 bg-background gap-4 border-b border-border-light">

            </div>

            </div>
<div class="w-12 h-[2px] bg-border-light"></div>

<span class="w-8 h-8 rounded-xl flex items-center justify-center border-2 shadow-sm">3</span> Ordonnance
            </div>
<div class="w-12 h-[2px] bg-border-light"></div>
<div class="flex items-center gap-2 text-sm font-semibold opacity-40 transition-all" id="step-4-indicator">

            </div>
</div>

<!-- TOAST -->
<div class="fixed bottom-20 lg:bottom-10 right-1/2 translate-x-1/2 lg:right-10 lg:translate-x-0 translate-y-20 opacity-0 bg-navy text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 flex items-center gap-4 z-[200]" id="toast">
<span class="material-symbols-outlined text-secondary" id="toast-icon">check_circle</span>
<span class="font-semibold text-sm" id="toast-message"></span>

<script>
    const API = 'https://api.bolamu.co/api/v1';

    function getAuthToken() {
        return localStorage.getItem('bolamu_token') 
            || localStorage.getItem('bolamu_doctor_token')
            || localStorage.getItem('token')
            || null;
    }

    const state = {
        currentPanel: 'Accueil',
        activeConsultation: null,
        activeCity: 'Tout',
        doctor: null,
        patients: [],
        rdvs: [],
        offers: [],
        posts: [],
        cities: ['Tout', 'Brazzaville', 'Pointe-Noire', 'Dolisie'],
        tabs: [
            { id: 'Accueil', icon: 'dashboard' },
            { id: 'Mes RDV', icon: 'calendar_today' },
            { id: 'Mes patients', icon: 'groups' },
            { id: 'Scanner', icon: 'qr_code_scanner' },
            { id: 'Scanner Zora', icon: 'smart_toy' },
            { id: 'Scanner DMN', icon: 'folder_open' },
            { id: 'Smart Flow', icon: 'analytics' },
            { id: 'Mes offres', icon: 'local_offer' },
            { id: 'Messages', icon: 'chat_bubble' },
            { id: 'Feed', icon: 'dynamic_feed' },
            { id: 'Mon profil', icon: 'account_circle' }
        ]
    };

    async function apiFetch(url, options = {}) {
        const token = getAuthToken();
        const res = await fetch(url, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
                ...(options.headers || {})
            }
        });
        if (res.status === 401) { 
            localStorage.clear(); 
            window.location.href = '/medecin/login.html'; 
        }
        return res;
    }

    function toggleSidebar() {
        const sb = document.getElementById('sidebar-menu');
        sb.classList.toggle('hidden');
        sb.classList.toggle('active');
    }

    function deconnexion() {
        localStorage.removeItem('bolamu_token');
        localStorage.removeItem('bolamu_doctor_token');
        localStorage.removeItem('token');
        localStorage.removeItem('bolamu_doctor_phone');
        localStorage.removeItem('phone');
        window.location.href = '/medecin/login.html';
    }

    function navigate(tabId) {
        state.currentPanel = tabId;
        renderNavigation();
        renderContent();
        if (window.innerWidth < 1024) {
            const sb = document.getElementById('sidebar-menu');
            sb.classList.add('hidden');
            sb.classList.remove('active');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderNavigation() {
        const side = document.getElementById('sidebar-nav');
        const bottom = document.getElementById('bottom-nav-container');
        
        side.innerHTML = state.tabs.map(tab => `
            <button onclick="navigate('${tab.id}')" class="w-full flex items-center gap-3 px-4 py-3.5 transition-all group ${state.currentPanel === tab.id ? 'active-nav' : 'hover:bg-white/5 hover:text-white'}">
                <span class="material-symbols-outlined text-[22px] transition-transform group-hover:scale-110">${tab.icon}</span>
                <span class="text-sm font-semibold">${tab.id}</span>
            </button>
        `).join('');

        bottom.innerHTML = state.tabs.map(tab => `
            <button onclick="navigate('${tab.id}')" class="flex flex-col items-center justify-center px-4 py-1.5 transition-all ${state.currentPanel === tab.id ? 'text-primary' : 'text-outline'}">
                <span class="material-symbols-outlined text-[20px]">${tab.icon}</span>
                <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">${tab.id.split(' ')[0]}</span>
            </button>
        `).join('');
    }

    function renderContent() {
        const canvas = document.getElementById('main-canvas');
        canvas.innerHTML = '';
        switch(state.currentPanel) {
            case 'Accueil': renderAccueil(canvas); break;
            case 'Mes RDV': renderRDVs(canvas); break;
            case 'Mes patients': renderPatients(canvas); break;
            case 'Scanner': renderScanner(canvas, 'Général'); break;
            case 'Scanner Zora': renderScanner(canvas, 'Zora'); break;
            case 'Scanner DMN': renderDMN(canvas); break;
            case 'Smart Flow': renderSmartFlow(canvas); break;
            case 'Mes offres': renderOffres(canvas); break;
            case 'Messages': renderMessages(canvas); break;
            case 'Feed': renderFeed(canvas); break;
            case 'Mon profil': renderProfil(canvas); break;
        }
    }

    async function renderAccueil(container) {
        if (!state.doctor) {
            container.innerHTML = '<div class="text-center py-20"><p class="text-outline">Chargement...</p></div>';
            return;
        }

        const doctor = state.doctor;
        
        try {
            const [rdvRes, fileAttenteRes] = await Promise.all([
                apiFetch(`${API}/medecin/rdv/today`),
                apiFetch(`${API}/medecin/file-attente`)
            ]);
            
            const rdvData = await rdvRes.json();
            const fileAttenteData = await fileAttenteRes.json();
            
            const rdvs = rdvRes.ok ? (rdvData.data || []) : [];
            const fileAttente = fileAttenteRes.ok ? (fileAttenteData.data || []) : [];

            container.innerHTML = `
                <div class="mb-10">
                    <p class="text-primary font-bold text-sm tracking-widest uppercase mb-2">Tableau de Bord</p>
                    <h1 class="text-3xl lg:text-4xl font-extrabold text-navy leading-tight">Bienvenue, <span class="text-primary">Dr. ${doctor.nom || '—'}</span></h1>
                    <p class="text-outline text-sm mt-1">${doctor.ville || 'Brazzaville'}, Congo</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                    <div class="card-custom p-8 bg-navy text-white relative overflow-hidden group">
                        <div class="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-8xl">groups</span>
                        </div>
                        <p class="text-white/60 font-bold text-xs uppercase tracking-wider mb-2">Patients Total</p>
                        <h2 class="text-4xl font-extrabold">${doctor.patients_count || 0}</h2>
                        <div class="mt-4 flex items-center gap-1.5 text-xs font-bold text-secondary">
                            <span class="material-symbols-outlined text-sm">trending_up</span> +${doctor.patients_growth || 0}% ce mois
                        </div>
                    </div>
                    <div class="card-custom p-8 group">
                        <p class="text-outline font-bold text-xs uppercase tracking-wider mb-2">Aujourd'hui</p>
                        <h2 class="text-4xl font-extrabold text-navy">${rdvs.length}</h2>
                        <p class="mt-4 text-xs font-semibold px-3 py-1.5 bg-primary/10 text-primary rounded-full inline-block">${rdvs.filter(r => r.status === 'terminé').length} terminées</p>
                    </div>
                    <div class="card-custom p-8 group">
                        <p class="text-outline font-bold text-xs uppercase tracking-wider mb-2">En Attente</p>
                        <h2 class="text-4xl font-extrabold text-navy">${fileAttente.length}</h2>
                        <p class="mt-4 text-xs font-semibold px-3 py-1.5 bg-error/10 text-error rounded-full inline-block">${fileAttente.filter(f => f.urgence).length} Urgence critique</p>
                    </div>
                    <div class="card-custom p-8 group">
                        <p class="text-outline font-bold text-xs uppercase tracking-wider mb-2">Statut</p>
                        <div style="margin-top:6px">
                            <span class="px-3 py-1.5 rounded-full text-[10px] font-extrabold uppercase ${doctor.is_active ? 'bg-secondary/10 text-secondary' : 'bg-error/10 text-error'}">
                                ${doctor.is_active ? 'Actif' : 'En attente'}
                            </span>
                        </div>
                        <p class="mt-4 text-xs font-semibold px-3 py-1.5 bg-background text-outline rounded-full inline-block">Vérification Bolamu</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 card-custom p-8">
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-extrabold text-navy">Prochains Rendez-vous</h3>
                            <button onclick="navigate('Mes RDV')" class="text-primary font-bold text-sm hover:underline">Tout voir</button>
                        </div>
                        <div class="space-y-4">
                            ${rdvs.length > 0 ? rdvs.map(r => `
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-2xl bg-background border border-border-light hover:border-primary/20 hover:bg-white transition-all">
                                    <div class="flex items-center gap-4 mb-4 sm:mb-0">
                                        <div class="w-12 h-12 rounded-xl bg-white border border-border-light flex items-center justify-center font-bold text-primary shadow-sm text-lg">${(r.patient_name || r.patient || 'P').charAt(0)}</div>
                                        <div>
                                            <p class="font-bold text-navy">${r.patient_name || r.patient || '—'}</p>
                                            <p class="text-xs text-outline font-medium flex items-center gap-1">
                                                <span class="material-symbols-outlined text-[14px]">schedule</span> ${r.appointment_time || r.time || '—'} • ${r.type || 'Consultation'}
                                            </p>
                                        </div>
                                    </div>
                                    <button onclick="openConsultation('${r.patient_name || r.patient || '—'}', '${r.id || r.appointment_id}')" class="btn-primary py-2.5 text-sm shadow-subtle">
                                        <span class="material-symbols-outlined text-[18px]">medical_information</span>
                                        Démarrer
                                    </button>
                                </div>
                            `).join('') : '<p class="text-outline text-center py-8">Aucun RDV aujourd\'hui</p>'}
                        </div>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="card-custom p-8 bg-background border-none shadow-none">
                            <h3 class="text-lg font-extrabold text-navy mb-6 flex items-center gap-2">
                                <span class="material-symbols-outlined text-primary">psychology</span> Smart Insights
                            </h3>
                            <div class="space-y-4">
                                <div class="p-5 bg-white rounded-2xl border border-border-light shadow-subtle group hover:-translate-y-1 transition-all">
                                    <p class="text-[10px] font-extrabold text-primary uppercase tracking-widest mb-1">IA Conseil Zora</p>
                                    <p class="text-sm font-medium text-navy">Optimisez vos créneaux du jeudi pour les patients chroniques.</p>
                                </div>
                                <div class="p-5 bg-white rounded-2xl border border-border-light shadow-subtle group hover:-translate-y-1 transition-all">
                                    <p class="text-[10px] font-extrabold text-error uppercase tracking-widest mb-1">Rappel Urgent</p>
                                    <p class="text-sm font-medium text-navy">Vérifier dossier M. Bakole (Rapport ECG du 23/05)</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card-custom p-6 zora-rail relative overflow-hidden group">
                            <div class="relative z-10">
                                <p class="text-[10px] font-black uppercase tracking-widest mb-1">Zora & MTN MoMo</p>
                                <h4 class="font-bold text-navy mb-2">Offre de bienvenue</h4>
                                <p class="text-[11px] mb-4 opacity-80">-15% sur la prochaine téléconsultation payée via MoMo.</p>
                                <button onclick="navigate('Scanner Zora')" class="bg-navy text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Activer</button>
                            </div>
                            <span class="material-symbols-outlined absolute right-[-10px] bottom-[-10px] text-8xl opacity-10 rotate-12">payments</span>
                        </div>
                    </div>
                </div>
            `;
        } catch (e) {
            console.error('[Accueil] Erreur:', e);
            container.innerHTML = '<div class="text-center py-20"><p class="text-error">Erreur de chargement</p></div>';
        }
    }

    async function renderRDVs(container) {
        container.innerHTML = `
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 mb-10">
                <div>
                    <p class="text-primary font-bold text-sm tracking-widest uppercase mb-1">Agenda</p>

    // Scanner DMN
    let dmnHtml5QrCode = null;
    let dmnCameraStream = null;

    async function startDmnCamera() {
        const reader = document.getElementById('dmn-qr-reader');
        if (!reader) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            dmnCameraStream = stream;
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            reader.appendChild(video);

            dmnHtml5QrCode = new Html5Qrcode(reader);
            await dmnHtml5QrCode.start(
                video,
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    stopDmnCamera();
                    document.getElementById('dmn-token-input').value = decodedText;
                    verifyDmnQr();
                },
                (errorMessage) => {}
            );
        } catch(e) {
            alert('Erreur d\'accès à la caméra : ' + e.message);
        }
    }

    function stopDmnCamera() {
        if (dmnHtml5QrCode) {
            dmnHtml5QrCode.stop().catch(function(err) { console.error('[stopDmnCamera] Erreur:', err); });
            dmnHtml5QrCode = null;
        }
        if (dmnCameraStream) {
            dmnCameraStream.getTracks().forEach(track => track.stop());
            dmnCameraStream = null;
        }
        const container = document.getElementById('dmn-camera-container');
        if (container) container.style.display = 'none';
    }

    async function validateConsultation() {
        if (!state.activeConsultation) return;
        
        try {
            const res = await apiFetch(`${API}/consultations/open`, {
                method: 'POST',
                body: JSON.stringify({
                    patient_phone: state.activeConsultation.patientName,
                    appointment_id: state.activeConsultation.appointmentId
                })
            });
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.message || 'Erreur ouverture consultation');
            
            consultStep = 2;
            renderConsultStep();
            showToast('Consultation ouverte avec succès');
        } catch (e) {
            console.error('[Consultation] Erreur:', e);
            showToast('Erreur: ' + e.message);
        }
    }

    function startDictation() {
        const btn = document.getElementById('dictation-btn');
        btn.innerHTML = `
            <div class="dictation-wave"><span></span><span></span><span></span><span></span><span></span></div>
            IA en écoute...
        `;
        btn.classList.add('pulse-recording');
        
        setTimeout(() => {
            const subj = document.getElementById('soap-subjective');
            const obj = document.getElementById('soap-objectif');
            if(subj) subj.value = "Patient rapporte des palpitations légères depuis 48h suite à un stress émotionnel. Fatigue modérée en fin de journée.";
            if(obj) obj.value = "Tension artérielle 138/82 mmHg. Rythme sinusal régulier à 78 bpm. Pas de souffle cardiaque à l'auscultation.";
            
            btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check_circle</span> Analyse IA Terminée';
            btn.classList.remove('pulse-recording', 'bg-error', 'shadow-error/20');
            btn.classList.add('bg-secondary', 'shadow-secondary/20');
            showToast("Transcription IA appliquée aux champs SOAP");
        }, 3000);
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').innerText = msg;
        toast.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
    }

    window.onload = async () => {
        console.log('[Dashboard-v2] Chargement initial...');
        const token = getAuthToken();
        console.log('[Dashboard-v2] Token:', token ? 'présent' : 'absent');
        
        if (!token) {
            console.log('[Dashboard-v2] Pas de token, redirection vers login');
            window.location.href = '/medecin/login.html';
            return;
        }

        // Récupérer le phone depuis localStorage (comme production)
        const _rawPhone = localStorage.getItem('bolamu_doctor_phone') || localStorage.getItem('phone') || '';
        let phone;
        try { phone = decodeURIComponent(_rawPhone); } catch(e) { phone = _rawPhone; }
        
        console.log('[Dashboard-v2] Phone:', phone);

        if (!phone) {
            console.log('[Dashboard-v2] Pas de phone, redirection vers login');
            window.location.href = '/medecin/login.html';
            return;
        }

        try {
            const res = await apiFetch(`${API}/doctors/profil?phone=${encodeURIComponent(phone)}`);
            const data = await res.json();
            console.log('[Dashboard-v2] Réponse profil:', res.ok, data);
            
            if (!res.ok) throw new Error(data.message || 'Erreur chargement profil');
            
            state.doctor = data.data;
            state.doctor.phone = phone; // Ajouter phone au state
            renderNavigation();
            renderContent();
        } catch (e) {
            console.error('[Dashboard-v2] Erreur:', e);
            localStorage.clear();
            window.location.href = '/medecin/login.html';
        }
    };
</script>
</body></html>
