<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#002b80",
                        "secondary": "#006b58",
                        "background": "#faf8ff",
                        "surface": "#ffffff",
                        "navy": "#1E2A4A",
                        "teal": "#0E7C61",
                        "border-light": "#EEF0F3",
                        "on-surface": "#1a1b22",
                        "outline": "#747685",
                        "error": "#ba1a1a"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"]
                    },
                    boxShadow: {
                        "subtle": "0 4px 20px rgba(30, 42, 74, 0.05)",
                        "hover": "0 8px 30px rgba(30, 42, 74, 0.08)"
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf8ff; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        
        .sidebar { background-color: #0A2463; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-custom { 
            background-color: #ffffff; 
            border-radius: 2rem; 
            box-shadow: 0 4px 20px rgba(30, 42, 74, 0.05); 
            border: 1px solid #EEF0F3;
            transition: all 0.3s ease;
        }
        .card-custom:hover { box-shadow: 0 8px 30px rgba(30, 42, 74, 0.08); }
        
        .active-nav { background-color: rgba(255, 255, 255, 0.1); border-radius: 0.75rem; color: #ffffff !important; }
        
        .btn-primary { 
            background-color: #002b80; 
            color: white; 
            border-radius: 1rem; 
            padding: 0.75rem 1.5rem; 
            font-weight: 600; 
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover { background-color: #001f5c; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .pulse-recording { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(186, 26, 26, 0); } 100% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); } }
        
        .dictation-wave { display: flex; align-items: center; gap: 3px; height: 14px; }
        .dictation-wave span { width: 2px; height: 100%; background: #ba1a1a; animation: wave 1s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.2); } }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .zora-rail { background: linear-gradient(135deg, #FFD200 0%, #F7941D 100%); color: #004F9F; }
        
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            main { margin-left: 0 !important; }
            header { left: 0 !important; width: 100% !important; }
        }
    </style>
</head>

<script>
    const API = 'https://api.bolamu.co/api/v1';

    function getAuthToken() {
        return localStorage.getItem('bolamu_token') 
            || localStorage.getItem('bolamu_doctor_token')
            || localStorage.getItem('token')
            || null;
    }

    const state = {
        currentPanel: 'Accueil',
        activeConsultation: null,
        activeCity: 'Tout',
        doctor: null,
        patients: [],
        rdvs: [],
        offers: [],
        posts: [],
        cities: ['Tout', 'Brazzaville', 'Pointe-Noire', 'Dolisie'],
        tabs: [
            { id: 'Accueil', icon: 'dashboard' },
            { id: 'Mes RDV', icon: 'calendar_today' },
            { id: 'Mes patients', icon: 'groups' },
            { id: 'Scanner', icon: 'qr_code_scanner' },
            { id: 'Scanner Zora', icon: 'smart_toy' },
            { id: 'Scanner DMN', icon: 'folder_open' },
            { id: 'Smart Flow', icon: 'analytics' },
            { id: 'Mes offres', icon: 'local_offer' },
            { id: 'Messages', icon: 'chat_bubble' },
            { id: 'Feed', icon: 'dynamic_feed' },
            { id: 'Mon profil', icon: 'account_circle' }
        ]
    };

    async function apiFetch(url, options = {}) {
        const token = getAuthToken();
        const res = await fetch(url, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
                ...(options.headers || {})
            }
        });
        if (res.status === 401) { 
            localStorage.clear(); 
            window.location.href = '/login.html'; 
        }
        return res;
    }

    function toggleSidebar() {
        const sb = document.getElementById('sidebar-menu');
        sb.classList.toggle('hidden');
        sb.classList.toggle('active');
    }

    function deconnexion() {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('bolamu_'));
        keys.forEach(k => localStorage.removeItem(k));
        localStorage.removeItem('token');
        localStorage.removeItem('phone');
        window.location.href = '/login.html';
    }

    function updateSidebarProfil() {
        if (!state.doctor) return;
        
        const doctor = state.doctor;
        const fullName = doctor.full_name || 'Dr';
        const initials = fullName.split(' ').map(n => n.charAt(0)).join('').substring(0, 2).toUpperCase();
        
        // Sidebar
        const initialsEl = document.getElementById('sidebar-initials');
        const nameEl = document.getElementById('sidebar-name');
        const specialtyEl = document.getElementById('sidebar-specialty');
        
        if (initialsEl) initialsEl.textContent = initials || 'DR';
        if (nameEl) nameEl.textContent = fullName || 'Dr. —';
        if (specialtyEl) specialtyEl.textContent = doctor.specialty || 'Médecin';
        
        // Topbar
        const topbarNameEl = document.querySelector('.text-right.hidden.md:block p.text-sm.font-bold.text-navy');
        const topbarCityEl = document.querySelector('.text-right.hidden.md:block p.text-xs.text-outline.font-medium');
        const topbarAvatarEl = document.querySelector('.w-10.h-10.lg\\:w-12.lg\\:h-12.rounded-xl.overflow-hidden img');
        const topbarAvatarContainer = document.querySelector('.w-10.h-10.lg\\:w-12.lg\\:h-12.rounded-xl.overflow-hidden');
        
        if (topbarNameEl) topbarNameEl.textContent = fullName || 'Dr. —';
        if (topbarCityEl) topbarCityEl.textContent = `${doctor.city || 'Brazzaville'}, Congo`;
        
        if (topbarAvatarContainer) {
            if (doctor.photo_url) {
                topbarAvatarContainer.innerHTML = `<img class="w-full h-full object-cover" src="${doctor.photo_url}" alt="Avatar">`;
            } else {
                topbarAvatarContainer.innerHTML = `<div class="w-full h-full bg-primary flex items-center justify-center text-white font-bold text-lg">${initials || 'DR'}</div>`;
            }
        }
    }

    function navigate(tabId) {
        state.currentPanel = tabId;
        renderNavigation();
        renderContent();
        if (window.innerWidth < 1024) {
            const sb = document.getElementById('sidebar-menu');
            sb.classList.add('hidden');
            sb.classList.remove('active');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderNavigation() {
        const side = document.getElementById('sidebar-nav');
        const bottom = document.getElementById('bottom-nav-container');
        
        side.innerHTML = state.tabs.map(tab => `
            <button onclick="navigate('${tab.id}')" class="w-full flex items-center gap-3 px-4 py-3.5 transition-all group ${state.currentPanel === tab.id ? 'active-nav' : 'hover:bg-white/5 hover:text-white'}">
                <span class="material-symbols-outlined text-[22px] transition-transform group-hover:scale-110">${tab.icon}</span>
                <span class="text-sm font-semibold">${tab.id}</span>
            </button>
        `).join('');

        bottom.innerHTML = state.tabs.map(tab => `
            <button onclick="navigate('${tab.id}')" class="flex flex-col items-center justify-center px-4 py-1.5 transition-all ${state.currentPanel === tab.id ? 'text-primary' : 'text-outline'}">
                <span class="material-symbols-outlined text-[20px]">${tab.icon}</span>
                <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">${tab.id.split(' ')[0]}</span>
            </button>
        `).join('');
    }

    function renderContent() {
        const canvas = document.getElementById('main-canvas');
        canvas.innerHTML = '';
        switch(state.currentPanel) {
            case 'Accueil': renderAccueil(canvas); break;
            case 'Mes RDV': renderRDVs(canvas); break;
            case 'Mes patients': renderPatients(canvas); break;
            case 'Scanner': renderScanner(canvas, 'Général'); break;
            case 'Scanner Zora': renderScanner(canvas, 'Zora'); break;
            case 'Scanner DMN': renderDMN(canvas); break;
            case 'Smart Flow': renderSmartFlow(canvas); break;
            case 'Mes offres': renderOffres(canvas); break;
            case 'Messages': renderMessages(canvas); break;
            case 'Feed': renderFeed(canvas); break;
            case 'Mon profil': renderProfil(canvas); break;
        }
    }

    async function renderAccueil(container) {
        if (!state.doctor) {
            container.innerHTML = '<div class="text-center py-20"><p class="text-outline">Chargement...</p></div>';
            return;
        }

        const doctor = state.doctor;
        const phone = state.doctor.phone || localStorage.getItem('bolamu_doctor_phone') || localStorage.getItem('phone');
        
        try {
            const [rdvRes, fileAttenteRes] = await Promise.all([
                apiFetch(`${API}/appointments/doctor/${encodeURIComponent(phone)}`),
                apiFetch(`${API}/consultations/queue`)
            ]);
            
            const rdvData = await rdvRes.json();
            const fileAttenteData = await fileAttenteRes.json();
            
            const rdvs = rdvRes.ok ? (rdvData.data || []) : [];
            const fileAttente = fileAttenteRes.ok ? (fileAttenteData.data || []) : [];

            container.innerHTML = `
                <div class="mb-10">
                    <p class="text-primary font-bold text-sm tracking-widest uppercase mb-2">Tableau de Bord</p>
                    <h1 class="text-3xl lg:text-4xl font-extrabold text-navy leading-tight">Bienvenue, <span class="text-primary">${doctor.full_name || '—'}</span></h1>
                    <p class="text-outline text-sm mt-1">${doctor.city || 'Brazzaville'}, Congo</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                    <div class="card-custom p-8 bg-navy text-white relative overflow-hidden group">
                        <div class="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-8xl">groups</span>
                        </div>
                        <p class="text-white/60 font-bold text-xs uppercase tracking-wider mb-2">Patients Total</p>
                        <h2 class="text-4xl font-extrabold">${doctor.patients_count || 0}</h2>
                        <div class="mt-4 flex items-center gap-1.5 text-xs font-bold text-secondary">
                            <span class="material-symbols-outlined text-sm">trending_up</span> +${doctor.patients_growth || 0}% ce mois
                        </div>
                    </div>
                    <div class="card-custom p-8 group">
                        <p class="text-outline font-bold text-xs uppercase tracking-wider mb-2">Aujourd'hui</p>
                        <h2 class="text-4xl font-extrabold text-navy">${rdvs.length}</h2>
                        <p class="mt-4 text-xs font-semibold px-3 py-1.5 bg-primary/10 text-primary rounded-full inline-block">${rdvs.filter(r => r.status === 'terminé').length} terminées</p>
                    </div>
                    <div class="card-custom p-8 group">
                        <p class="text-outline font-bold text-xs uppercase tracking-wider mb-2">En Attente</p>
                        <h2 class="text-4xl font-extrabold text-navy">${fileAttente.length}</h2>
                        <p class="mt-4 text-xs font-semibold px-3 py-1.5 bg-error/10 text-error rounded-full inline-block">${fileAttente.filter(f => f.urgence).length} Urgence critique</p>
                    </div>
                    <div class="card-custom p-8 group">
                        <p class="text-outline font-bold text-xs uppercase tracking-wider mb-2">Statut</p>
                        <div style="margin-top:6px">
                            <span class="px-3 py-1.5 rounded-full text-[10px] font-extrabold uppercase ${doctor.is_active ? 'bg-secondary/10 text-secondary' : 'bg-error/10 text-error'}">
                                ${doctor.is_active ? 'Actif' : 'En attente'}
                            </span>
                        </div>
                        <p class="mt-4 text-xs font-semibold px-3 py-1.5 bg-background text-outline rounded-full inline-block">Vérification Bolamu</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 card-custom p-8">
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-extrabold text-navy">Prochains Rendez-vous</h3>
                            <button onclick="navigate('Mes RDV')" class="text-primary font-bold text-sm hover:underline">Tout voir</button>
                        </div>
                        <div class="space-y-4">
                            ${rdvs.length > 0 ? rdvs.map(r => `
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-2xl bg-background border border-border-light hover:border-primary/20 hover:bg-white transition-all">
                                    <div class="flex items-center gap-4 mb-4 sm:mb-0">
                                        <div class="w-12 h-12 rounded-xl bg-white border border-border-light flex items-center justify-center font-bold text-primary shadow-sm text-lg">${(r.patient_name || r.patient || 'P').charAt(0)}</div>
                                        <div>
                                            <p class="font-bold text-navy">${r.patient_name || r.patient || '—'}</p>
                                            <p class="text-xs text-outline font-medium flex items-center gap-1">
                                                <span class="material-symbols-outlined text-[14px]">schedule</span> ${r.appointment_time || r.time || '—'} • ${r.type || 'Consultation'}
                                            </p>
                                        </div>
                                    </div>
                                    <button onclick="openConsultation('${r.patient_name || r.patient || '—'}', '${r.id || r.appointment_id}')" class="btn-primary py-2.5 text-sm shadow-subtle">
                                        <span class="material-symbols-outlined text-[18px]">medical_information</span>
                                        Démarrer
                                    </button>
                                </div>
                            `).join('') : '<p class="text-outline text-center py-8">Aucun RDV aujourd\'hui</p>'}
                        </div>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="card-custom p-8 zora-rail relative overflow-hidden group">
                            <div class="relative z-10">
                                <p class="text-[10px] font-black uppercase tracking-widest mb-1">Zora & MTN MoMo</p>
                                <h4 class="font-bold text-navy mb-2">Offre de bienvenue</h4>

    async function startGeneralCamera() {
        const reader = document.getElementById('scanner-qr-reader');
        if (!reader) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            generalCameraStream = stream;
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            reader.appendChild(video);

            generalHtml5QrCode = new Html5Qrcode(reader);
            await generalHtml5QrCode.start(
                video,
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    stopGeneralCamera();
                    document.getElementById('scan-input').value = decodedText;
                    handleScanSubmit('Général');
                },
                (errorMessage) => {}
            );
        } catch(e) {
            console.error('[Scanner] Erreur caméra:', e);
        }
    }

    function stopGeneralCamera() {
        if (generalHtml5QrCode) {
            generalHtml5QrCode.stop().catch(function(err) { console.error('[stopGeneralCamera] Erreur:', err); });
            generalHtml5QrCode = null;
        }
        if (generalCameraStream) {
            generalCameraStream.getTracks().forEach(track => track.stop());
            generalCameraStream = null;
        }
    }

    function handleScanSubmit(type) {
        const input = document.getElementById('scan-input');
        if (!input || !input.value.trim()) {
            alert('Veuillez entrer un ID');
            return;
        }
        // Logique de traitement du QR code
        alert('QR Code scanné: ' + input.value);
    }

    let chatSocket = null;
    var bcwUnread = 0;

    function escBcw(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c]));
    }

    function bcwTimeAgo(dateStr) {
        const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
        if (diff < 60) return "à l'instant";
        if (diff < 3600) return Math.floor(diff / 60) + ' min';
        if (diff < 86400) return Math.floor(diff / 3600) + ' h';
        if (diff < 172800) return 'hier';
        if (diff < 604800) return Math.floor(diff / 86400) + ' j';
        return new Date(dateStr).toLocaleDateString('fr-FR');
    }

    function updateMessagesBadge() {
        const badge = document.getElementById('bcw-badge-medecin');
        if (!badge) return;
        badge.textContent = bcwUnread > 9 ? '9+' : String(bcwUnread);
        badge.style.display = bcwUnread > 0 ? 'inline-block' : 'none';
    }

    function initBcwSocket() {
        if (window.__bolamuSocket) return;
        const token = getAuthToken();
        const phone = state.doctor?.phone || localStorage.getItem('bolamu_doctor_phone') || localStorage.getItem('phone');
        if (!token || !phone) return;

        window.__bolamuSocket = io('https://api.bolamu.co', {
            auth: { token },
            transports: ['websocket']
        });

        window.__bolamuSocket.on('connect', () => {
            console.log('[Socket] Connecté');
        });

        window.__bolamuSocket.on('chat:new_message', (payload) => {
            if (payload.sender_phone === phone) return;
            bcwUnread++;
            updateMessagesBadge();
        });

        window.__bolamuSocket.on('disconnect', () => {
            console.log('[Socket] Déconnecté');
        });
    }

    async function loadConversations() {
        const list = document.getElementById('bcw-conv-list');
        const token = getAuthToken();
        if (!list || !token) return;
        list.innerHTML = '<div style="text-align:center;padding:24px;color:#747685;">Chargement…</div>';
        
        try {
            const res = await apiFetch(`${API}/chat/conversations`);
            const d = await res.json();
            if (!d || !d.success || !d.data || !d.data.length) {
                list.innerHTML = '<div style="text-align:center;padding:32px 16px;color:#747685;">Aucune conversation.<br>Démarrez-en une avec le bouton ci-dessus.</div>';
                return;
            }
            list.innerHTML = d.data.map(conv => {
                const name = conv.other_name || 'Contact';
                const photo = conv.other_photo_url || null;
                const initials = name.charAt(0).toUpperCase();
                const avatarHtml = photo 
                    ? `<img src="${photo}" style="width:44px;height:44px;border-radius:50%;object-cover;flex-shrink:0;">`
                    : `<span style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:#0A2463;color:#fff;font-weight:800;flex-shrink:0;">${initials}</span>`;
                const lastMsg = conv.last_message ? escBcw(conv.last_message.length > 50 ? conv.last_message.slice(0, 50) + '…' : conv.last_message) : 'Aucun message';
                const time = conv.last_message_at ? bcwTimeAgo(conv.last_message_at) : '';
                const unread = parseInt(conv.unread_count) || 0;
                const badgeHtml = unread > 0 ? `<span style="background:#BA1A1A;color:#fff;font-size:0.66rem;font-weight:800;border-radius:9999px;padding:2px 7px;flex-shrink:0;">${unread > 9 ? '9+' : unread}</span>` : '';
                const photoArg = photo ? `'${escBcw(photo).replace(/'/g, "\\'")}'` : 'null';
                return `<div onclick="openConversation(${conv.id}, '${escBcw(name).replace(/'/g, "\\'")}', ${photoArg})" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;cursor:pointer;border:1px solid #EEF0F3;margin-bottom:8px;background:#fff;">
                    ${avatarHtml}
                    <div style="flex:1;min-width:0;">
                        <div style="font-size:0.88rem;font-weight:700;color:#002b80;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escBcw(name)}</div>
                        <div style="font-size:0.76rem;color:#747685;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${lastMsg}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
                        <span style="font-size:0.66rem;color:#747685;">${time}</span>
                        ${badgeHtml}
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            list.innerHTML = '<div style="text-align:center;padding:24px;color:#BA1A1A;">Erreur de chargement</div>';
        }
    }

                    <div class="p-6 bg-background rounded-2xl border border-border-light">
                        <label class="text-[10px] font-black text-outline uppercase tracking-[0.2em] block mb-2">Nom du médicament *</label>
                        <input type="text" id="ord-med-nom" class="w-full rounded-xl border-border-light bg-white px-4 py-3 text-sm focus:ring-2 focus:ring-primary/10 outline-none" placeholder="Commencez à taper… (ex : Paracétamol)">
                        <div class="flex gap-3 mt-3">
                            <input type="text" id="ord-med-dosage" class="flex-1 rounded-xl border-border-light bg-white px-4 py-3 text-sm focus:ring-2 focus:ring-primary/10 outline-none" placeholder="Dosage (ex : 500mg)">
                            <input type="text" id="ord-med-quantite" class="flex-1 rounded-xl border-border-light bg-white px-4 py-3 text-sm focus:ring-2 focus:ring-primary/10 outline-none" placeholder="Quantité (ex : 1 boîte)">
                        </div>
                        <input type="text" id="ord-med-posologie" class="w-full rounded-xl border-border-light bg-white px-4 py-3 text-sm focus:ring-2 focus:ring-primary/10 outline-none mt-3" placeholder="Posologie / instructions (ex : 3x/jour pendant 5 jours)">
                        <button onclick="ajouterMedicament()" class="btn-primary w-full py-3 mt-3">
                            <span class="material-symbols-outlined">add</span> Ajouter à l'ordonnance
                        </button>
                    </div>
                    <div class="p-6 bg-background rounded-2xl border border-border-light">
                        <label class="text-[10px] font-black text-outline uppercase tracking-[0.2em] block mb-2">Médicaments de l'ordonnance</label>
                        <div id="ord-med-list" class="space-y-2"></div>
                        <textarea id="ord-medications" style="display:none;"></textarea>
                    </div>
                    <div class="p-6 bg-background rounded-2xl border border-border-light">
                        <label class="text-[10px] font-black text-outline uppercase tracking-[0.2em] block mb-2">Instructions complémentaires</label>
                        <input type="text" id="ord-instructions" class="w-full rounded-xl border-border-light bg-white px-4 py-3 text-sm focus:ring-2 focus:ring-primary/10 outline-none" placeholder="Ex : Prendre après les repas…">
                    </div>
                    <div class="flex justify-between gap-4 pt-6">
                        <button onclick="consultStep=2; renderConsultStep()" class="px-8 py-4 text-outline font-bold text-sm hover:text-navy transition-colors">Retour</button>
                        <button onclick="confirmerValidation()" class="btn-primary px-12 py-4 shadow-xl">
                            Finaliser & Signer <span class="material-symbols-outlined">edit_square</span>
                        </button>
                    </div>
                </div>
            `;
            renderOrdMedList();
        } else {
            body.innerHTML = `
                <div class="text-center space-y-10 py-12 animate-in zoom-in duration-500">
                    <div class="w-24 h-24 bg-secondary/10 rounded-full flex items-center justify-center mx-auto text-secondary border-4 border-white shadow-xl">
                        <span class="material-symbols-outlined text-5xl">task_alt</span>
                    </div>
                    <div>
                        <h3 class="text-3xl font-black text-navy mb-3">Consultation Clôturée !</h3>
                        <p class="text-outline font-medium max-w-md mx-auto">Le dossier numérique de <b>${state.activeConsultation?.patientName || '—'}</b> a été synchronisé. L'ordonnance a été envoyée sur son application Bolamu Patient.</p>
                    </div>
                    <div class="flex flex-col sm:flex-row justify-center gap-4">
                        <button onclick="closeConsultation(); showToast('Consultation archivée'); renderContent()" class="btn-primary px-12 py-4 shadow-xl">
                            Retour au Tableau de Bord
                        </button>
                        <button class="px-8 py-4 text-primary font-black text-sm uppercase tracking-widest hover:underline">Imprimer copie physique</button>
                    </div>
                </div>
            `;
        }
    }

    function formatMedLine(m) {
        let ligne = m.nom;
        if (m.dosage) ligne += ` ${m.dosage}`;
        const details = [];
        if (m.quantite) details.push(`Qté : ${m.quantite}`);
        if (m.posologie) details.push(m.posologie);
        if (details.length) ligne += ` — ${details.join(' — ')}`;
        return ligne;
    }

    async function ajouterMedicament() {
        const nomInput = document.getElementById('ord-med-nom');
        const dosageInput = document.getElementById('ord-med-dosage');
        const quantiteInput = document.getElementById('ord-med-quantite');
        const posologieInput = document.getElementById('ord-med-posologie');

        const nom = nomInput.value.trim();
        if (!nom) {
            nomInput.style.borderColor = '#BA1A1A';
            nomInput.focus();
            return;
        }
        nomInput.style.borderColor = '';

        const med = {
            nom,
            dosage: dosageInput.value.trim(),
            quantite: quantiteInput.value.trim(),
            posologie: posologieInput.value.trim(),
            isSSP: false
        };

        // Détermination automatique SSP via ssp_catalog
        try {
            const res = await apiFetch(`${API}/smartflow/medicaments/check?nom=${encodeURIComponent(nom)}`);
            const data = await res.json();
            med.isSSP = !!(data.success && data.data && data.data.is_ssp);
        } catch (e) {
            med.isSSP = false;
        }

        medicamentsData.push(med);
        renderOrdMedList();

        // Reset inputs
        nomInput.value = '';
        dosageInput.value = '';
        quantiteInput.value = '';
        posologieInput.value = '';
        nomInput.focus();
    }

    function renderOrdMedList() {
        const list = document.getElementById('ord-med-list');
        const textarea = document.getElementById('ord-medications');
        if (!list) return;

        if (medicamentsData.length === 0) {
            list.innerHTML = '<p class="text-sm text-outline">Aucun médicament ajouté</p>';
            if (textarea) textarea.value = '';
            return;
        }

        list.innerHTML = medicamentsData.map((m, idx) => `
            <div class="flex items-center justify-between p-3 bg-white rounded-xl border border-border-light">
                <div class="flex-1">
                    <p class="font-bold text-navy text-sm">${m.nom}</p>
                    <p class="text-xs text-outline">${formatMedLine(m)}</p>
                </div>
                <div class="flex items-center gap-2">
                    ${m.isSSP ? '<span class="text-[10px] font-bold text-secondary bg-secondary/10 px-2 py-1 rounded-full">SSP</span>' : ''}
                    <button onclick="supprimerMedicament(${idx})" class="text-error hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-lg">delete</span>
                    </button>
                </div>
            </div>
        `).join('');

        if (textarea) {
            textarea.value = medicamentsData.map(m => formatMedLine(m)).join('\n');
        }
    }

    function supprimerMedicament(idx) {
        medicamentsData.splice(idx, 1);
        renderOrdMedList();
    }

    async function confirmerValidation() {
        const medications = document.getElementById('ord-medications').value.trim();
        const instructions = document.getElementById('ord-instructions').value.trim();
        
        if (!medications) {
            alert('Ajoutez au moins un médicament à l\'ordonnance.');
            return;
        }

        const phone = state.doctor?.phone || localStorage.getItem('bolamu_doctor_phone') || localStorage.getItem('phone');
        const appointmentId = state.activeConsultation?.appointmentId;
        const patientPhone = state.activeConsultation?.patientName;

        try {
            // Clôturer la consultation
            const resVal = await apiFetch(`${API}/consultations/${appointmentId}/close`, {
                method: 'POST',
                body: JSON.stringify({
                    diagnostic: 'Consultation terminée',
                    anamnese: '',
                    examen_clinique: '',
                    notes: ''
                })
            });
            const dataVal = await resVal.json();
            if (!resVal.ok) throw new Error(dataVal.message || 'Erreur validation consultation');

            // Créer l'ordonnance
            const resPres = await apiFetch(`${API}/prescriptions/create`, {
                method: 'POST',
                body: JSON.stringify({
                    appointment_id: appointmentId,
                    patient_phone: patientPhone,
                    doctor_phone: phone,
                    medications: medications,
                    instructions: instructions || ''
                })
            });
            const dataPres = await resPres.json();
            if (!resPres.ok) throw new Error(dataPres.message || 'Erreur ordonnance');

            consultStep = 4;
            renderConsultStep();
            showToast('Ordonnance créée avec succès');
        } catch (e) {
            console.error('[Ordonnance] Erreur:', e);
            showToast('Erreur: ' + e.message);
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').innerText = msg;
        toast.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
    }

    window.onload = async () => {
        console.log('[Dashboard-v2] Chargement initial...');
        const token = getAuthToken();
        console.log('[Dashboard-v2] Token:', token ? 'présent' : 'absent');
        
        if (!token) {
            console.log('[Dashboard-v2] Pas de token, redirection vers login');
            window.location.href = '/login.html';
            return;
        }

        // Récupérer le phone depuis localStorage (comme production)
        const _rawPhone = localStorage.getItem('bolamu_doctor_phone') || localStorage.getItem('phone') || '';
        let phone;
        try { phone = decodeURIComponent(_rawPhone); } catch(e) { phone = _rawPhone; }
        
        console.log('[Dashboard-v2] Phone:', phone);

        if (!phone) {
            console.log('[Dashboard-v2] Pas de phone, redirection vers login');
            window.location.href = '/login.html';
            return;
        }

        try {
            const res = await apiFetch(`${API}/doctors/profil?phone=${encodeURIComponent(phone)}`);
            const data = await res.json();
            console.log('[Dashboard-v2] Réponse profil:', res.ok, data);
            
            if (!res.ok) throw new Error(data.message || 'Erreur chargement profil');
            
            state.doctor = data.data;
            state.doctor.phone = phone; // Ajouter phone au state
            updateSidebarProfil(); // Mettre à jour la sidebar avec les vraies données
            renderNavigation();
            renderContent();
        } catch (e) {
            console.error('[Dashboard-v2] Erreur:', e);
            localStorage.clear();
            window.location.href = '/login.html';
        }
    };
</script>
</body></html>
