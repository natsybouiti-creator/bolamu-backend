<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF0FF"/>
      <stop offset="100%" stop-color="#F3F3FE"/>
    </linearGradient>
    <linearGradient id="pumpBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003FB1"/>
      <stop offset="100%" stop-color="#0A2463"/>
    </linearGradient>
  </defs>

  <!-- Ciel / fond -->
  <rect x="0" y="0" width="800" height="450" fill="url(#sky)"/>

  <!-- Sol -->
  <rect x="0" y="360" width="800" height="90" fill="#DCE1F5"/>
  <rect x="0" y="358" width="800" height="4" fill="#C3C9EC"/>

  <!-- Auvent de station générique -->
  <rect x="120" y="70" width="560" height="26" rx="6" fill="#0A2463"/>
  <rect x="150" y="96" width="16" height="230" fill="#9AA6D6"/>
  <rect x="634" y="96" width="16" height="230" fill="#9AA6D6"/>

  <!-- Pompe à essence générique (aucune enseigne) -->
  <g>
    <rect x="330" y="180" width="140" height="200" rx="14" fill="url(#pumpBody)"/>
    <rect x="352" y="204" width="96" height="60" rx="8" fill="#F3F3FE"/>
    <rect x="362" y="216" width="76" height="10" rx="4" fill="#00C9A7"/>
    <rect x="362" y="234" width="50" height="8" rx="4" fill="#9498A8"/>
    <circle cx="400" cy="300" r="26" fill="#00C9A7"/>
    <rect x="388" y="288" width="24" height="24" rx="4" fill="#0A2463"/>
    <rect x="350" y="360" width="100" height="14" rx="6" fill="#0A2463"/>
  </g>

  <!-- Tuyau / pistolet stylisé -->
  <path d="M 470 250 C 520 250 520 300 480 320" fill="none" stroke="#00C9A7" stroke-width="8" stroke-linecap="round"/>
  <rect x="470" y="312" width="34" height="14" rx="6" fill="#0A2463" transform="rotate(18 487 319)"/>

  <!-- Voiture générique -->
  <g>
    <rect x="500" y="330" width="150" height="46" rx="16" fill="#003FB1"/>
    <rect x="524" y="304" width="100" height="34" rx="14" fill="#003FB1"/>
    <rect x="534" y="310" width="36" height="22" rx="4" fill="#EAF0FF"/>
    <rect x="576" y="310" width="36" height="22" rx="4" fill="#EAF0FF"/>
    <circle cx="530" cy="378" r="16" fill="#0A2463"/>
    <circle cx="620" cy="378" r="16" fill="#0A2463"/>
    <circle cx="530" cy="378" r="6" fill="#C3C9EC"/>
    <circle cx="620" cy="378" r="6" fill="#C3C9EC"/>
  </g>

  <!-- Zora coin décoratif -->
  <circle cx="700" cy="130" r="26" fill="#F5A623"/>
  <text x="700" y="139" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">Z</text>
</svg>
