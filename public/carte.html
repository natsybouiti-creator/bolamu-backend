// Init carte
function initMap() {

  const legend = L.control({ position: 'bottomright' });

      background:white;padding:12px 16px;border-radius:12px;
      font-family:'Plus Jakarta Sans',sans-serif;font-size:0.75rem;

    `;

// Créer icône marker custom
function createIcon(type, isPartenaire) {
  const color = typeColors[type];
  const border = isPartenaire ? '#FF6B35' : color;
  const svg = `
    <svg width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 26 18 26S36 31.5 36 18C36 8.06 27.94 0 18 0z" 
            fill="${color}" stroke="${border}" stroke-width="${isPartenaire ? 3 : 1}"/>
      <circle cx="18" cy="18" r="10" fill="white" opacity="0.95"/>
    </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [36, 44],
    iconAnchor: [18, 44],
    popupAnchor: [0, -44]
  });
}

// Render markers et liste
function renderAll() {
  // Clear markers
  currentMarkers.forEach(m => map.removeLayer(m));
  currentMarkers = [];
  
  const filtered = etablissements.filter(e => 
    e.ville === currentCity && 
    (currentType === 'all' || e.type === currentType)
  );
  
  // Update compteur
  document.getElementById('count').textContent = filtered.length;
  
  // Render liste
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  
  // Partenaires en premier
  const sorted = [...filtered].sort((a,b) => b.partenaire - a.partenaire);
  
  sorted.forEach(e => {
    // Carte liste
    const card = document.createElement('div');
    card.id = 'card-' + e.id;
    card.style.cssText = `
      background:#fff; border:1px solid #C3C5D7; border-radius:16px; 
      margin-bottom:10px; overflow:hidden; cursor:pointer;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display:flex;
    `;
    card.onmouseenter = () => {
      card.style.borderColor = typeColors[e.type];
      card.style.transform = 'translateY(-2px)';
      card.style.boxShadow = '0 12px 40px rgba(0, 63, 177, 0.08)';
    };
    card.onmouseleave = () => {
      card.style.borderColor = e.partenaire ? '#FF6B35' : '#C3C5D7';
      card.style.transform = 'none';
      card.style.boxShadow = 'none';
    };
    if(e.partenaire) card.style.borderColor = '#FF6B35';
    
    card.innerHTML = `
      <div style="width:80px;min-width:80px;height:80px;overflow:hidden;">
        <img src="${e.photo}" alt="${e.nom}" 
             style="width:100%;height:100%;object-fit:cover;"
             onerror="this.style.background='#F3F3FE'">
      </div>
      <div style="padding:10px 12px;flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          ${e.partenaire ? `
            <span style="background:#FF6B35;color:#ffffff;font-size:0.5rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:3px 8px;border-radius:9999px;border:none;white-space:nowrap;">
              Partenaire Bolamu
            </span>` : ''}
          <span style="background:${e.type === 'clinique' ? '#003FB1' : e.type === 'pharmacie' ? '#00C9A7' : '#FF6B35'};color:${e.type === 'pharmacie' ? '#0A2463' : '#ffffff'};font-size:0.5rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:3px 8px;border-radius:9999px;border:none;white-space:nowrap;">
            ${e.type}
          </span>
        </div>
        <div style="font-size:0.8125rem;font-weight:700;color:#0A2463;
                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          ${e.nom}
        </div>
        <div style="font-size:0.6875rem;color:#434654;margin-top:2px;
                    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          ${e.adresse}
        </div>
        <div style="font-size:0.6875rem;color:#00C9A7;font-weight:600;margin-top:2px;">
          ${e.horaires}
        </div>
      </div>
    `;
    
    card.onclick = () => focusEtablissement(e);
    container.appendChild(card);
    
    // Marker carte
    const marker = L.marker([e.lat, e.lng], { icon: createIcon(e.type, e.partenaire) });
    
    // Popup
    const popupMaxWidth = window.innerWidth < 400 ? Math.min(240, window.innerWidth - 40) : 260;
    const popupContent = `
      <div style="font-family:'Plus Jakarta Sans',sans-serif;min-width:min(220px, calc(100vw - 60px));">
        ${e.partenaire ? `
          <div style="background:#FF6B35;color:#ffffff;font-size:0.5rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;padding:3px 8px;border-radius:9999px;border:none;margin-bottom:8px;display:inline-block;">
            Partenaire Bolamu
          </div>` : ''}
        <img src="${e.photo}" alt="${e.nom}" 
             style="width:100%;height:100px;object-fit:cover;border-radius:8px;margin-bottom:8px;">
        <div style="font-size:0.875rem;font-weight:800;color:#0A2463;margin-bottom:4px;">
          ${e.nom}
        </div>
        <div style="font-size:0.75rem;color:#434654;margin-bottom:4px;">
          ${e.adresse}
        </div>
        <div style="font-size:0.75rem;color:#00C9A7;font-weight:600;margin-bottom:4px;">
          ${e.horaires}
        </div>
        <div style="font-size:0.75rem;color:#434654;margin-bottom:8px;">
          ${e.description}
        </div>
        <a href="tel:${e.tel}" 
           style="display:block;background:#003FB1;color:#fff;text-align:center;
                  padding:8px;border-radius:9999px;font-size:0.75rem;font-weight:700;
                  text-decoration:none;">
          Appeler ${e.tel}
        </a>
      </div>
    `;
    
    marker.bindPopup(popupContent, { maxWidth: popupMaxWidth, autoPan: true });
    marker.addTo(map);
    
    marker.on('click', () => {
      highlightCard(e.id);
    });
    
    currentMarkers.push(marker);
  });
  
  // Fit bounds si markers
  if(currentMarkers.length > 0) {
    const group = L.featureGroup(currentMarkers);
    map.fitBounds(group.getBounds().pad(0.1));
  }
}

function focusEtablissement(e) {
  if (window.innerWidth <= 768) {
    document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  map.setView([e.lat, e.lng], 16);
  const marker = currentMarkers.find((m,i) => {
    const filtered = etablissements.filter(et => 
      et.ville === currentCity && (currentType === 'all' || et.type === currentType)
    );
    const sorted = [...filtered].sort((a,b) => b.partenaire - a.partenaire);
    return sorted[i] && sorted[i].id === e.id;
  });
  if(marker) marker.openPopup();
  highlightCard(e.id);
}

function highlightCard(id) {
  document.querySelectorAll('[id^="card-"]').forEach(c => {
    c.style.transform = 'none';
    c.style.boxShadow = 'none';
  });
  const card = document.getElementById('card-' + id);
  if(card) {
    card.style.transform = 'translateX(4px)';
    card.style.boxShadow = '0 4px 16px rgba(0, 63, 177, 0.10)';
    card.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

function filterCity(city) {
  currentCity = city;
  
  // Update boutons ville
  document.getElementById('btn-brazza').style.background = city === 'brazza' ? '#00C9A7' : 'transparent';
  document.getElementById('btn-brazza').style.color = city === 'brazza' ? '#0A2463' : 'rgba(255,255,255,0.7)';
  document.getElementById('btn-pnr').style.background = city === 'pnr' ? '#00C9A7' : 'transparent';
  document.getElementById('btn-pnr').style.color = city === 'pnr' ? '#0A2463' : 'rgba(255,255,255,0.7)';
  
  // Centre carte
  const centers = {
    brazza: [-4.2670, 15.2730],
    pnr: [-4.7850, 11.8500]
  };
  map.setView(centers[city], 13);
  
  renderAll();
}

function filterType(type) {
  currentType = type;
  
  // Update boutons type
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const isActive = btn.dataset.type === type;
    btn.style.background = isActive ? '#00C9A7' : 'transparent';
    btn.style.color = isActive ? '#0A2463' : 'rgba(255,255,255,0.7)';
  });
  
  renderAll();
}

// Init au chargement
window.addEventListener('load', initMap);
</script>

</body>
</html>
