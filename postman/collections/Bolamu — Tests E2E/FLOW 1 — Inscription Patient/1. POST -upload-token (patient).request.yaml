$kind: http-request
name: 1. POST /upload/token (patient)
url: "{{base_url}}/upload/token"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "phone": "{{patient_phone}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      var json = pm.response.json();
      pm.test('upload_token présent', function () { pm.expect(json.upload_token).to.be.a('string').and.not.empty; });
      if (json.upload_token) {
        pm.environment.set('upload_token', json.upload_token);
        pm.collectionVariables.set('upload_token', json.upload_token);
      }
    language: text/javascript
order: 1000
