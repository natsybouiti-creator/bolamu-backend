services:
  - type: web
    name: bolamu-backend
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    disk:
      name: bolamu-uploads
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: bolamu-redis
          property: connectionString
      # Spike Chantier 3 — rendu texte serveur (carte cadeau Zora), à retirer
      # après validation si la piste fontconfig est abandonnée. Chemin non
      # vérifié dans ce repo, basé sur la convention documentée par Render
      # pour env: node (/opt/render/project/src/). Doit être défini ici, au
      # lancement du process — testé en local : une affectation dynamique
      # dans le code applicatif après coup n'a aucun effet (fontconfig est
      # déjà initialisé côté natif à ce moment), donc cette valeur EST la
      # seule source de vérité si ce chemin absolu est incorrect, le spike
      # retombera en police par défaut, exactement comme en local avant fix.
      - key: FONTCONFIG_FILE
        value: /opt/render/project/src/assets/fonts/fonts.conf

  - type: redis
    name: bolamu-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []
