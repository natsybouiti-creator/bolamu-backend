services:
  - type: web
    name: bolamu-backend
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    disk:
      name: bolamu-uploads
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: bolamu-redis
          property: connectionString
      # Requis pour le rendu texte serveur (sharp/librsvg, carte cadeau Zora
      # — Chantier 3) : sans cette variable, fontconfig ne trouve pas Plus
      # Jakarta Sans (assets/fonts/) et retombe silencieusement sur une
      # police système par défaut. Doit être défini ici, au lancement du
      # process — une affectation dynamique dans le code applicatif après
      # coup n'a aucun effet (fontconfig est déjà initialisé côté natif à ce
      # moment, vérifié en local et confirmé en prod le 8 juillet 2026).
      - key: FONTCONFIG_FILE
        value: /opt/render/project/src/assets/fonts/fonts.conf

  - type: redis
    name: bolamu-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []
